[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install --include=dev && NODE_OPTIONS=--max-old-space-size=1536 npm run build && cd ../backend && npm install --omit=dev"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/api/health"
